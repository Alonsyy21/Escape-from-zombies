<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURPLE ARROW - Zombie Dash</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            image-rendering: pixelated;
            border: 3px solid #0ff;
            box-shadow: 0 0 30px #0ff;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f00;
            font-size: 50px;
            text-shadow: 0 0 20px #f00;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div>Punteggio: <span id="score">0</span></div>
        <div>Vita: <span id="health">100</span></div>
        <div>Super: <span id="super">0</span>/100</div>
    </div>
    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size:24px">Punteggio: <span id="finalScore">0</span></span><br><br>
        <span style="font-size:20px">Premi R per ricominciare</span>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let health = 100;
        let superCharge = 0;
        let gameRunning = true;

        // Responsive
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.95, 1200);
            canvas.height = Math.min(window.innerHeight * 0.85, 600);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Giocatore: Freccetta viola
        let player = {
            x: 100,
            y: canvas.height / 2,
            width: 40,
            height: 30,
            speed: 6
        };

        let keys = {};
        let bullets = [];
        let superBullets = [];
        let enemies = [];
        let particles = [];
        let scrollSpeed = 4;

        // Controlli
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if ((e.key === 'r' || e.key === 'R') && !gameRunning) resetGame();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Mouse per sparare
        canvas.addEventListener('click', shoot);
        canvas.addEventListener('contextmenu', e => {
            e.preventDefault();
            if (superCharge >= 100) launchSuperAttack();
        });

        function shoot() {
            if (!gameRunning) return;
            bullets.push({
                x: player.x + player.width,
                y: player.y + player.height / 2,
                speed: 18,
                color: '#0ff'
            });
        }

        function launchSuperAttack() {
            if (superCharge < 100) return;
            superCharge = 0;
            
            // Onda di energia viola
            for (let i = 0; i < 12; i++) {
                superBullets.push({
                    x: player.x + player.width,
                    y: player.y + player.height / 2 + (i-6)*15,
                    speed: 15,
                    angle: (i-6) * 8
                });
            }
            
            // Particelle esplosive
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: player.x + 20,
                    y: player.y + 15,
                    vx: Math.random() * 8 - 4,
                    vy: Math.random() * 8 - 4,
                    life: 30,
                    color: '#f0f'
                });
            }
        }

        class Enemy {
            constructor() {
                this.x = canvas.width + Math.random() * 200;
                this.y = Math.random() * (canvas.height - 40) + 20;
                this.size = 18;
                this.speed = 2.5 + Math.random() * 1.5;
                this.health = 3;
            }
        }

        function createExplosion(x, y, color = '#0ff') {
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.random() * 10 - 5,
                    vy: Math.random() * 10 - 5,
                    life: 25 + Math.random() * 15,
                    color: color
                });
            }
        }

        function resetGame() {
            score = 0;
            health = 100;
            superCharge = 0;
            bullets = [];
            superBullets = [];
            enemies = [];
            particles = [];
            player.y = canvas.height / 2;
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
        }

        function update() {
            if (!gameRunning) return;

            // Movimento giocatore (solo su/giù, il gioco scorre automaticamente)
            if (keys['arrowup'] || keys['w']) player.y -= player.speed;
            if (keys['arrowdown'] || keys['s']) player.y += player.speed;
            if (keys['arrowleft'] || keys['a']) player.x -= player.speed * 0.7;
            if (keys['arrowright'] || keys['d']) player.x += player.speed * 0.7;

            // Limiti schermo
            player.x = Math.max(30, Math.min(canvas.width - 80, player.x));
            player.y = Math.max(20, Math.min(canvas.height - 40, player.y));

            // Auto-scroll (sensazione di avanzamento)
            score += 1;

            // Spawn nemici
            if (Math.random() < 0.04 + score/8000) {
                enemies.push(new Enemy());
            }

            // Aggiorna proiettili normali
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.speed;
                if (b.x > canvas.width + 50) bullets.splice(i, 1);
            }

            // Aggiorna super proiettili
            for (let i = superBullets.length - 1; i >= 0; i--) {
                let b = superBullets[i];
                b.x += b.speed * Math.cos(b.angle * Math.PI / 180);
                b.y += b.speed * Math.sin(b.angle * Math.PI / 180);
                if (b.x > canvas.width + 100) superBullets.splice(i, 1);
            }

            // Aggiorna nemici
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.x -= e.speed + scrollSpeed * 0.3;

                // Collisione con giocatore
                if (Math.hypot(e.x - player.x, e.y - player.y) < 35) {
                    health -= 25;
                    createExplosion(e.x, e.y, '#f00');
                    enemies.splice(i, 1);
                    if (health <= 0) {
                        health = 0;
                        gameRunning = false;
                        document.getElementById('finalScore').textContent = score;
                        document.getElementById('gameOver').style.display = 'block';
                    }
                    continue;
                }

                if (e.x < -50) {
                    enemies.splice(i, 1);
                    continue;
                }

                // Collisione proiettili normali
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < e.size) {
                        e.health--;
                        bullets.splice(j, 1);
                        createExplosion(b.x, b.y);
                        if (e.health <= 0) {
                            score += 100;
                            superCharge = Math.min(100, superCharge + 18);
                            createExplosion(e.x, e.y, '#f0f');
                            enemies.splice(i, 1);
                        }
                        break;
                    }
                }

                // Collisione super proiettili
                for (let j = superBullets.length - 1; j >= 0; j--) {
                    let b = superBullets[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + 8) {
                        e.health -= 2;
                        if (e.health <= 0) {
                            score += 150;
                            superCharge = Math.min(100, superCharge + 12);
                            createExplosion(e.x, e.y, '#f0f');
                            enemies.splice(i, 1);
                        }
                    }
                }
            }

            // Aggiorna particelle
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vx *= 0.96;
                p.vy *= 0.96;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Ricarica super lenta
            if (superCharge < 100) superCharge += 0.08;
        }

        function draw() {
            // Sfondo scuro con linee di movimento
            ctx.fillStyle = '#0a0015';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linee di velocità
            ctx.strokeStyle = '#330044';
            ctx.lineWidth = 2;
            for (let i = 0; i < 20; i++) {
                let y = (Date.now() / 30 + i * 40) % (canvas.height + 100) - 50;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y + 30);
                ctx.stroke();
            }

            // Disegna giocatore (freccetta viola)
            ctx.save();
            ctx.translate(player.x + 20, player.y + 15);
            ctx.fillStyle = '#c0f';
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#f0f';
            
            // Freccia
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-15, -18);
            ctx.lineTo(-8, 0);
            ctx.lineTo(-15, 18);
            ctx.closePath();
            ctx.fill();
            
            // Glow interno
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(8, 0, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Proiettili normali
            ctx.fillStyle = '#0ff';
            for (let b of bullets) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0ff';
                ctx.fillRect(b.x, b.y - 3, 22, 6);
            }

            // Super proiettili (energia viola)
            for (let b of superBullets) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#f0f';
                ctx.fillStyle = '#f0f';
                ctx.fillRect(b.x, b.y - 5, 28, 10);
            }

            // Nemici (punti blu - zombie)
            for (let e of enemies) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00f';
                ctx.fillStyle = '#44f';
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Occhi zombie
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(e.x - 6, e.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x + 6, e.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // Particelle
            for (let p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 6, 6);
            }
            ctx.globalAlpha = 1;

            // UI in-game
            document.getElementById('score').textContent = score;
            document.getElementById('health').textContent = Math.floor(health);
            document.getElementById('super').textContent = Math.floor(superCharge);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Istruzioni iniziali
        console.log("%cPURPLE ARROW - Zombie Dash avviato!\nWASD / Frecce: Muoviti\nClick sinistro: Spara\nClick destro: SUPER ATTACCO (quando carica)", "color:#c0f; font-size:16px");

        resetGame();
        gameLoop();
    </script>
</body>
</html>
