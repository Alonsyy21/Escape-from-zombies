<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PURPLE ARROW - Zombie Dash</title>
    <style>
        body { 
            margin:0; padding:0; background:#000; overflow:hidden; 
            height:100vh; display:flex; justify-content:center; align-items:center; 
            font-family: 'Courier New', monospace;
        }
        canvas { 
            image-rendering:pixelated; 
            border:4px solid #0ff; 
            box-shadow:0 0 40px #0ff; 
        }
        #ui { 
            position:absolute; top:15px; left:15px; color:#0ff; 
            text-shadow:0 0 10px #0ff; font-size:18px; pointer-events:none; 
        }
        #instructions {
            position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
            color:#0ff; background:rgba(0,0,0,0.7); padding:8px 20px;
            border-radius:8px; font-size:16px; white-space:nowrap;
        }
        #gameOver {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.95); padding:30px 50px; border:3px solid #f00;
            color:#f00; font-size:42px; text-align:center; display:none; border-radius:15px;
        }
        #restartBtn {
            margin-top:20px; padding:12px 35px; font-size:26px; background:#c026d3;
            color:white; border:none; border-radius:10px; cursor:pointer;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div>Punteggio: <span id="score">0</span></div>
        <div>Vita: <span id="health">100</span></div>
        <div>Super: <span id="super">0</span>/100</div>
    </div>
    
    <div id="instructions">
        ↑ ↓ ← →  o  WASD : Muoviti | Click sinistro: Spara | Click destro / Doppio tap: SUPER
    </div>

    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size:28px">Punteggio: <span id="finalScore">0</span></span><br><br>
        <button id="restartBtn">Ricomincia (R)</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0, health = 100, superCharge = 0, gameRunning = true;
        let lastBossScore = 0;

        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.98, 1280);
            canvas.height = Math.min(window.innerHeight * 0.92, 680);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let player = { x: 140, y: canvas.height / 2, width: 60, height: 45, speed: 8 };
        let keys = {}, bullets = [], superBullets = [], enemies = [], particles = [], bosses = [];

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if ((e.key === 'r' || e.key === 'R') && !gameRunning) resetGame();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener('click', () => { if(gameRunning) shoot(); });
        canvas.addEventListener('contextmenu', e => { 
            e.preventDefault(); 
            if(gameRunning && superCharge >= 100) launchSuperAttack(); 
        });

        let lastTap = 0;
        canvas.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTap < 450 && superCharge >= 100) launchSuperAttack();
            lastTap = now;
        });

        function shoot() {
            bullets.push({ x: player.x + 52, y: player.y + 22, speed: 22 });
        }

        function launchSuperAttack() {
            if (superCharge < 100) return;
            superCharge = 0;
            for (let i = -6; i <= 6; i++) {
                superBullets.push({ x: player.x + 55, y: player.y + 22 + i*11, speed: 17, angle: i*5.5 });
            }
        }

        class Enemy {
            constructor() {
                this.x = canvas.width + 80;
                this.y = Math.random() * (canvas.height - 80) + 40;
                this.size = 24;
                this.speed = 3 + Math.random() * 1.5;
                this.health = 3;
                this.isBoss = false;
            }
        }

        class Boss {
            constructor() {
                this.x = canvas.width + 100;
                this.y = canvas.height / 2;
                this.size = 45;
                this.speed = 2.2;
                this.health = 100;
                this.isBoss = true;
            }
        }

        function createExplosion(x, y, color = '#0ff', big = false) {
            let amount = big ? 55 : 32;
            for (let i = 0; i < amount; i++) {
                particles.push({ 
                    x, y, 
                    vx: Math.random()* (big?14:11) - (big?7:5.5), 
                    vy: Math.random()* (big?14:11) - (big?7:5.5), 
                    life: big ? 45 : 32, 
                    color 
                });
            }
        }

        function resetGame() {
            score = 0; health = 100; superCharge = 0; lastBossScore = 0;
            bullets = []; superBullets = []; enemies = []; bosses = []; particles = [];
            player.y = canvas.height / 2;
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
        }

        function update() {
            if (!gameRunning) return;

            if (keys['arrowup'] || keys['w']) player.y -= player.speed;
            if (keys['arrowdown'] || keys['s']) player.y += player.speed;
            if (keys['arrowleft'] || keys['a']) player.x -= player.speed * 0.75;
            if (keys['arrowright'] || keys['d']) player.x += player.speed * 0.75;

            player.x = Math.max(40, Math.min(canvas.width * 0.45, player.x));
            player.y = Math.max(30, Math.min(canvas.height - 55, player.y));

            score += 1;

            // Spawn boss ogni 5000 punti
            if (score - lastBossScore >= 5000) {
                bosses.push(new Boss());
                lastBossScore = Math.floor(score / 5000) * 5000;
            }

            // Spawn nemici normali
            if (Math.random() < 0.065 + score/11000) {
                enemies.push(new Enemy());
            }

            // Aggiorna proiettili
            for (let i = bullets.length-1; i >= 0; i--) {
                bullets[i].x += bullets[i].speed;
                if (bullets[i].x > canvas.width + 50) bullets.splice(i,1);
            }
            for (let i = superBullets.length-1; i >= 0; i--) {
                let b = superBullets[i];
                b.x += b.speed * Math.cos(b.angle * Math.PI/180);
                b.y += b.speed * Math.sin(b.angle * Math.PI/180);
                if (b.x > canvas.width + 120) superBullets.splice(i,1);
            }

            // Aggiorna nemici normali
            for (let i = enemies.length-1; i >= 0; i--) {
                let e = enemies[i];
                e.x -= e.speed + 3.8;
                // ... (collisioni rimaste uguali)
                if (Math.hypot(e.x - player.x - 30, e.y - player.y - 22) < 45) {
                    health -= 25; createExplosion(e.x, e.y, '#f00'); enemies.splice(i,1);
                    if (health <= 0) endGame();
                    continue;
                }
                // collisioni proiettili (codice abbreviato per spazio)
                for (let j = bullets.length-1; j >= 0; j--) {
                    if (Math.hypot(bullets[j].x - e.x, bullets[j].y - e.y) < e.size + 6) {
                        e.health--; bullets.splice(j,1);
                        if (e.health <= 0) {
                            score += 130; superCharge = Math.min(100, superCharge + 25);
                            createExplosion(e.x, e.y, '#f0f'); enemies.splice(i,1);
                        }
                        break;
                    }
                }
            }

            // Aggiorna Boss
            for (let i = bosses.length-1; i >= 0; i--) {
                let b = bosses[i];
                b.x -= b.speed + 2.5;
                b.y += Math.sin(Date.now()/200) * 1.2; // movimento ondulato

                if (Math.hypot(b.x - player.x - 30, b.y - player.y - 22) < 60) {
                    health -= 40;
                    createExplosion(b.x, b.y, '#f00', true);
                    bosses.splice(i,1);
                    if (health <= 0) endGame();
                    continue;
                }

                // Colpito da proiettili normali
                for (let j = bullets.length-1; j >= 0; j--) {
                    if (Math.hypot(bullets[j].x - b.x, bullets[j].y - b.y) < b.size + 10) {
                        b.health -= 1;
                        bullets.splice(j,1);
                        if (b.health <= 0) {
                            score += 1500;
                            superCharge = 100;
                            createExplosion(b.x, b.y, '#f0f', true);
                            bosses.splice(i,1);
                        }
                        break;
                    }
                }
            }

            // Particelle
            for (let i = particles.length-1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.96; p.vy *= 0.96;
                if (p.life <= 0) particles.splice(i,1);
            }

            if (superCharge < 100) superCharge += 0.13;
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function draw() {
            ctx.fillStyle = '#0a0015';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linee sfondo
            ctx.strokeStyle = '#5e0080';
            for (let i = 0; i < 28; i++) {
                let y = (Date.now()/22 + i*38) % (canvas.height + 120) - 60;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y + 35); ctx.stroke();
            }

            // Freccetta viola
            ctx.save();
            ctx.translate(player.x + 30, player.y + 22);
            ctx.shadowBlur = 50; ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#c026d3';
            ctx.beginPath();
            ctx.moveTo(35, 0); ctx.lineTo(-18, -24); ctx.lineTo(-8, -8);
            ctx.lineTo(-25, 0); ctx.lineTo(-8, 8); ctx.lineTo(-18, 24);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.stroke();
            ctx.shadowBlur = 30; ctx.shadowColor = '#fff';
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(12, 0, 8, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // Proiettili normali
            ctx.shadowBlur = 22; ctx.shadowColor = '#00ffff'; ctx.fillStyle = '#00ffff';
            for (let b of bullets) ctx.fillRect(b.x, b.y-5, 28, 10);

            // Super
            ctx.shadowBlur = 40; ctx.shadowColor = '#ff00ff'; ctx.fillStyle = '#ff00ff';
            for (let b of superBullets) ctx.fillRect(b.x, b.y-7, 35, 14);

            // Nemici normali
            for (let e of enemies) {
                ctx.shadowBlur = 28; ctx.shadowColor = '#00ccff'; ctx.fillStyle = '#2277ff';
                ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff4444';
                ctx.beginPath(); ctx.arc(e.x-8, e.y-7, 6, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x+8, e.y-7, 6, 0, Math.PI*2); ctx.fill();
            }

            // Boss (rosso/viola grande)
            for (let b of bosses) {
                ctx.shadowBlur = 45; ctx.shadowColor = '#ff0088';
                ctx.fillStyle = '#c026d3';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff2222';
                ctx.beginPath(); ctx.arc(b.x-12, b.y-10, 10, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(b.x+12, b.y-10, 10, 0, Math.PI*2); ctx.fill();
            }

            // Particelle
            for (let p of particles) {
                ctx.globalAlpha = p.life / 40;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x-4, p.y-4, 9, 9);
            }
            ctx.globalAlpha = 1;

            document.getElementById('score').textContent = score;
            document.getElementById('health').textContent = Math.floor(health);
            document.getElementById('super').textContent = Math.floor(superCharge);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('restartBtn').addEventListener('click', resetGame);
        resetGame();
        gameLoop();
    </script>
</body>
</html>
