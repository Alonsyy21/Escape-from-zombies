<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURPLE ARROW - Zombie Dash</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            image-rendering: pixelated;
            border: 3px solid #0ff;
            box-shadow: 0 0 30px #0ff;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div>Punteggio: <span id="score">0</span></div>
        <div>Vita: <span id="health">100</span></div>
        <div>Super: <span id="super">0</span>/100</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0, health = 100, superCharge = 0, gameRunning = true;

        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.95, 1280);
            canvas.height = Math.min(window.innerHeight * 0.85, 640);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let player = { x: 120, y: canvas.height / 2, width: 50, height: 36, speed: 7 };
        let keys = {}, bullets = [], superBullets = [], enemies = [], particles = [];

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if ((e.key === 'r' || e.key === 'R') && !gameRunning) resetGame(); });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener('click', () => { if(gameRunning) shoot(); });
        canvas.addEventListener('contextmenu', e => { e.preventDefault(); if(superCharge >= 100) launchSuperAttack(); });

        function shoot() {
            bullets.push({ x: player.x + 45, y: player.y + 18, speed: 20 });
        }

        function launchSuperAttack() {
            if (superCharge < 100) return;
            superCharge = 0;
            for (let i = -5; i <= 5; i++) {
                superBullets.push({
                    x: player.x + 45,
                    y: player.y + 18 + i*12,
                    speed: 16,
                    angle: i * 6
                });
            }
        }

        class Enemy {
            constructor() {
                this.x = canvas.width + 100;
                this.y = Math.random() * (canvas.height - 60) + 30;
                this.size = 22;
                this.speed = 2.8 + Math.random() * 1.2;
                this.health = 3;
            }
        }

        function createExplosion(x, y, color = '#0ff') {
            for (let i = 0; i < 28; i++) {
                particles.push({
                    x, y,
                    vx: Math.random()*10-5,
                    vy: Math.random()*10-5,
                    life: 28,
                    color
                });
            }
        }

        function resetGame() {
            score = 0; health = 100; superCharge = 0;
            bullets = []; superBullets = []; enemies = []; particles = [];
            player.y = canvas.height / 2;
            gameRunning = true;
        }

        function update() {
            if (!gameRunning) return;

            if (keys['arrowup'] || keys['w']) player.y -= player.speed;
            if (keys['arrowdown'] || keys['s']) player.y += player.speed;
            if (keys['arrowleft'] || keys['a']) player.x -= player.speed * 0.6;
            if (keys['arrowright'] || keys['d']) player.x += player.speed * 0.6;

            player.x = Math.max(40, Math.min(canvas.width * 0.4, player.x));
            player.y = Math.max(25, Math.min(canvas.height - 45, player.y));

            score += 1;

            // Spawn nemici
            if (Math.random() < 0.055 + score/10000) enemies.push(new Enemy());

            // Proiettili
            for (let i = bullets.length-1; i >= 0; i--) {
                bullets[i].x += bullets[i].speed;
                if (bullets[i].x > canvas.width + 50) bullets.splice(i,1);
            }

            for (let i = superBullets.length-1; i >= 0; i--) {
                let b = superBullets[i];
                b.x += b.speed * Math.cos(b.angle * Math.PI/180);
                b.y += b.speed * Math.sin(b.angle * Math.PI/180);
                if (b.x > canvas.width + 100) superBullets.splice(i,1);
            }

            // Nemici
            for (let i = enemies.length-1; i >= 0; i--) {
                let e = enemies[i];
                e.x -= e.speed + 3.5;

                if (Math.hypot(e.x - player.x -25, e.y - player.y -18) < 40) {
                    health -= 22;
                    createExplosion(e.x, e.y, '#f00');
                    enemies.splice(i,1);
                    if (health <= 0) gameRunning = false;
                    continue;
                }

                // Collisioni proiettili
                for (let j = bullets.length-1; j >= 0; j--) {
                    if (Math.hypot(bullets[j].x - e.x, bullets[j].y - e.y) < e.size) {
                        e.health--;
                        bullets.splice(j,1);
                        if (e.health <= 0) {
                            score += 120;
                            superCharge = Math.min(100, superCharge + 22);
                            createExplosion(e.x, e.y, '#f0f');
                            enemies.splice(i,1);
                        }
                        break;
                    }
                }
            }

            // Particelle
            for (let i = particles.length-1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life--; p.vx *= 0.95; p.vy *= 0.95;
                if (p.life <= 0) particles.splice(i,1);
            }

            if (superCharge < 100) superCharge += 0.1;
        }

        function draw() {
            ctx.fillStyle = '#0a0015';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linee di movimento
            ctx.strokeStyle = '#4b0082';
            for (let i = 0; i < 25; i++) {
                let y = (Date.now()/25 + i*45) % (canvas.height + 100) - 50;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y + 25);
                ctx.stroke();
            }

            // === FRECCETTA VIOLA MIGLIORATA ===
            ctx.save();
            ctx.translate(player.x + 25, player.y + 18);
            ctx.shadowBlur = 35;
            ctx.shadowColor = '#ff00ff';

            // Corpo freccia
            ctx.fillStyle = '#c026d3';
            ctx.beginPath();
            ctx.moveTo(28, 0);           // punta
            ctx.lineTo(-22, -22);        // ala sinistra
            ctx.lineTo(-8, 0);           // rientro
            ctx.lineTo(-22, 22);         // ala destra
            ctx.closePath();
            ctx.fill();

            // Bordo luminoso
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Glow centrale
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(8, 0, 7, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();

            // Proiettili normali
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#00ffff';
            for (let b of bullets) ctx.fillRect(b.x, b.y-4, 26, 8);

            // Super proiettili
            ctx.shadowBlur = 35;
            ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#ff00ff';
            for (let b of superBullets) ctx.fillRect(b.x, b.y-6, 32, 12);

            // Zombie blu
            for (let e of enemies) {
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#00aaff';
                ctx.fillStyle = '#3388ff';
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = '#ff2222';
                ctx.beginPath(); ctx.arc(e.x-7, e.y-6, 5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x+7, e.y-6, 5, 0, Math.PI*2); ctx.fill();
            }

            // Particelle
            for (let p of particles) {
                ctx.globalAlpha = p.life / 25;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 7, 7);
            }
            ctx.globalAlpha = 1;

            document.getElementById('score').textContent = score;
            document.getElementById('health').textContent = Math.floor(health);
            document.getElementById('super').textContent = Math.floor(superCharge);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetGame();
        gameLoop();
    </script>
</body>
</html>
