<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PURPLE ARROW - Zombie Dash</title>
    <style>
        body { 
            margin:0; padding:0; background:#000; overflow:hidden; 
            height:100vh; display:flex; justify-content:center; align-items:center; 
            font-family: 'Courier New', monospace;
            touch-action: none;
            user-select: none;
        }
        canvas { 
            image-rendering:pixelated; 
            border:4px solid #0ff; 
            box-shadow:0 0 40px #0ff; 
            touch-action: none;
        }
        #ui { 
            position:absolute; top:15px; left:15px; color:#0ff; 
            text-shadow:0 0 10px #0ff; font-size:18px; pointer-events:none; z-index:10;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .dpad {
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 8px;
            pointer-events: all;
        }
        .dpad button {
            background: rgba(0, 255, 255, 0.25);
            border: 3px solid #0ff;
            color: #0ff;
            font-size: 24px;
            border-radius: 12px;
            touch-action: none;
        }
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: all;
        }
        .action-buttons button {
            background: rgba(255, 0, 255, 0.3);
            border: 3px solid #f0f;
            color: #f0f;
            font-size: 22px;
            padding: 18px 25px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
        }
        #instructions { display: none; } /* Nascosto perché ora ci sono i pulsanti */
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div>Punteggio: <span id="score">0</span></div>
        <div>Vita: <span id="health">100</span></div>
        <div>Super: <span id="super">0</span>/100</div>
    </div>

    <div class="controls">
        <!-- Sinistra: D-Pad -->
        <div class="dpad">
            <div></div>
            <button id="up">↑</button>
            <div></div>
            <button id="left">←</button>
            <div></div>
            <button id="right">→</button>
            <div></div>
            <button id="down">↓</button>
            <div></div>
        </div>

        <!-- Destra: Azioni -->
        <div class="action-buttons">
            <button id="shootBtn">Spara</button>
            <button id="superBtn">SUPER</button>
        </div>
    </div>

    <div id="gameOver" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); padding:30px 50px; border:3px solid #f00; color:#f00; font-size:42px; text-align:center; border-radius:15px;">
        GAME OVER<br>
        <span style="font-size:28px">Punteggio: <span id="finalScore">0</span></span><br><br>
        <button id="restartBtn" style="padding:12px 35px; font-size:26px; background:#c026d3; color:white; border:none; border-radius:10px;">Ricomincia</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0, health = 100, superCharge = 0, gameRunning = true;
        let lastBossScore = 0;

        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.98, 1280);
            canvas.height = Math.min(window.innerHeight * 0.85, 680);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let player = { x: 140, y: canvas.height / 2, width: 60, height: 45, speed: 8 };
        let keys = {}, bullets = [], superBullets = [], enemies = [], bosses = [], particles = [];

        // === CONTROLLI TASTIERA (per PC) ===
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // === CONTROLLI TOUCH ===
        const upBtn = document.getElementById('up');
        const downBtn = document.getElementById('down');
        const leftBtn = document.getElementById('left');
        const rightBtn = document.getElementById('right');
        const shootBtn = document.getElementById('shootBtn');
        const superBtn = document.getElementById('superBtn');

        function setKey(key, value) {
            keys[key] = value;
        }

        // D-Pad
        upBtn.addEventListener('touchstart', () => setKey('arrowup', true));
        upBtn.addEventListener('touchend', () => setKey('arrowup', false));
        downBtn.addEventListener('touchstart', () => setKey('arrowdown', true));
        downBtn.addEventListener('touchend', () => setKey('arrowdown', false));
        leftBtn.addEventListener('touchstart', () => setKey('arrowleft', true));
        leftBtn.addEventListener('touchend', () => setKey('arrowleft', false));
        rightBtn.addEventListener('touchstart', () => setKey('arrowright', true));
        rightBtn.addEventListener('touchend', () => setKey('arrowright', false));

        // Pulsanti azione
        shootBtn.addEventListener('touchstart', () => { if(gameRunning) shoot(); });
        superBtn.addEventListener('touchstart', () => { if(gameRunning && superCharge >= 100) launchSuperAttack(); });

        // Click destro e mouse (per PC)
        canvas.addEventListener('click', () => gameRunning && shoot());
        canvas.addEventListener('contextmenu', e => { 
            e.preventDefault(); 
            gameRunning && superCharge >= 100 && launchSuperAttack(); 
        });

        function shoot() {
            bullets.push({ x: player.x + 52, y: player.y + 22, speed: 22 });
        }

        function launchSuperAttack() {
            if (superCharge < 100) return;
            superCharge = 0;
            for (let i = -7; i <= 7; i++) {
                superBullets.push({ x: player.x + 55, y: player.y + 22 + i*10, speed: 18, angle: i*5 });
            }
        }

        // Resto del gioco (nemici, boss, collisioni, draw...) rimane uguale
        class Enemy { /* ... */ }
        class Boss { /* ... */ }
        function createExplosion(x, y, color = '#0ff', big = false) { /* ... */ }
        function resetGame() { /* ... */ }
        function update() { /* ... */ }
        function draw() { /* ... */ }
        function gameLoop() { /* ... */ }

        document.getElementById('restartBtn').addEventListener('click', resetGame);
        resetGame();
        gameLoop();
    </script>
</body>
</html>
